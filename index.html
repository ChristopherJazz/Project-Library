<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKLAT</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>AKLAT</h1>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main">
    <section class="intro">
      <h2>Your Personal Library</h2>
      <p>Manage your books with ease. Add, edit, and keep track of your reading collection.</p>
    </section>

    <section class="library">
      <h3>Books</h3>
      
      <button class="open-modal">+ Add Book</button>

      <div class="book-list">
        <!-- Placeholder cards -->
        <div class="book-card">
          <h4>Book Title</h4>
          <p>Author Name</p>
        </div>

        <div class="book-card">
          <h4>Another Book</h4>
          <p>Author Name</p>
        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>AKLAT © 2026</p>
  </footer>

    <div class="modal-overlay">

        <div class="modal">

    <h2>Add New Book</h2>

    <form class="book-form">
        <label>
        Title
        <input type="text" required>
      </label>

      <label>
        Author
        <input type="text" required>
      </label>

      <label>
        Pages
        <input type="number">
      </label>

      <label class="checkbox">
        <input type="checkbox">
        Read
      </label>

      <div class="form-actions">
        <button type="submit">Add</button>
        <button type="button" class="close-modal">Cancel</button>
        </div>
    </form>

  </div>

</div>
<script src="script.js"></script>
</body>
</html>
